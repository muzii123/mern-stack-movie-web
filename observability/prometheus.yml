global:
  scrape_interval: 15s      # scrape metrics every 15 seconds
  evaluation_interval: 15s

scrape_configs:

  # Scrape dev backend
  - job_name: "movies-backend-dev"
    static_configs:
      - targets: ["movies-backend-dev:3000"]
        labels:
          environment: "dev"

  # Scrape staging backend
  - job_name: "movies-backend-staging"
    static_configs:
      - targets: ["movies-backend-staging:3001"]
        labels:
          environment: "staging"

  # Scrape prod backend
  - job_name: "movies-backend-prod"
    static_configs:
      - targets: ["movies-backend-prod:3002"]
        labels:
          environment: "prod"

  # Scrape Prometheus itself
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
