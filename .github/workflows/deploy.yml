name: MERN App CI/CD

on:
  push:
    branches:
      - main


jobs:

  deploy:

    runs-on: self-hosted


    steps:

    - name: Checkout code
      uses: actions/checkout@v4


    - name: Check Docker
      run: |
        docker --version
        docker compose version


    - name: Build containers
      run: |
        docker compose build


    - name: Stop old containers
      run: |
        docker compose down


    - name: Start containers
      run: |
        docker compose up -d


    - name: Check running containers
      run: |
        docker ps
