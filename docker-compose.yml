version: "3.9"
services:
  mongo:
    image: mongo:7
    container_name: movies-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: movies-backend
    environment:
      PORT: 3000
      MONGO_URI: mongodb://mongo:27017/moviesApp
      NODE_ENV: development
      JWT_SECRET: alskdfjlkasdfjlksa23123asdlfk
    ports:
      - "3000:3000"
    depends_on:
      - mongo

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: movies-frontend
    environment:
      VITE_BACKEND_TARGET: http://backend:3000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  mongo-data:
