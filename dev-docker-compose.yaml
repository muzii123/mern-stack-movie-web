version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: movies-mongo-dev
    ports:
      - "27017:27017"
    volumes:
      - mongo-dev-data:/data/db

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: movies-backend-dev
    env_file:
      - DEV.env
    ports:
      - "3000:3000"
    depends_on:
      - mongo

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: movies-frontend-dev
    env_file:
      - DEV.env
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  mongo-dev-data:
