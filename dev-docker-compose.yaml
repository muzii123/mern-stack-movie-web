version: "3.9"

name: movies-dev

services:
  mongo:
    image: mongo:7
    container_name: movies-mongo-dev
    ports:
      - "27017:27017"
    volumes:
      - mongo-dev-data:/data/db

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: movies-backend-dev
    env_file:
      - DEV.env
    ports:
      - "3000:3000"
    depends_on:
      - mongo
    networks:
      - movies-dev_default
      - movies-observability_observability

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_BACKEND_TARGET: http://backend:3000
    container_name: movies-frontend-dev
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  mongo-dev-data:

networks:
  movies-dev_default:
    driver: bridge
  movies-observability_observability:
    external: true
